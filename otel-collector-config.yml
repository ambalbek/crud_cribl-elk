# otel-collector-config.yml — OpenTelemetry Collector configuration
#
# Receives traces/metrics/logs from all three services via OTLP,
# and exports them to a configurable backend.
#
# To send to a backend, uncomment the relevant exporter below and
# add it to the pipeline exporters list.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

  # Add service.environment resource attribute from env var if set
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:ENVIRONMENT:-development}
        action: upsert

exporters:
  # Always log to stdout — useful for development and as a fallback
  debug:
    verbosity: normal

  # ── Uncomment to forward to Jaeger ────────────────────────────────────────
  # otlp/jaeger:
  #   endpoint: "jaeger:4317"
  #   tls:
  #     insecure: true

  # ── Uncomment to forward to Elastic APM ───────────────────────────────────
  # otlp/elastic:
  #   endpoint: "${env:ELASTIC_APM_SERVER_URL}/intake/v2/events"
  #   headers:
  #     Authorization: "Bearer ${env:ELASTIC_APM_SECRET_TOKEN}"

  # ── Uncomment to forward to Grafana / Tempo ───────────────────────────────
  # otlp/tempo:
  #   endpoint: "tempo:4317"
  #   tls:
  #     insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]
