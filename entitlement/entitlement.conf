<VirtualHost *:80>
    ServerName bastion.example.com

    ProxyPreserveHost Off
    ProxyRequests Off
    ProxyTimeout 120

    # Disable caching
    Header unset ETag
    Header set Cache-Control "no-cache, no-store, must-revalidate"
    Header set Pragma "no-cache"
    Header set Expires "0"

    # Proxy to Flask app on remote host
    ProxyPass /entitlements/ http://<REMOTE_HOST>:8282/
    ProxyPassReverse /entitlements/ http://<REMOTE_HOST>:8282/

    <Location /entitlements/>
        Require all granted
    </Location>

    # SELinux: allow httpd to make outbound connections
    # Run: sudo setsebool -P httpd_can_network_connect 1

    ErrorLog logs/entitlement_error.log
    CustomLog logs/entitlement_access.log combined
</VirtualHost>
