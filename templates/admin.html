<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cribl Framework — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f8fafc;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --accent:  #e53e3e;
      --accent2: #0284c7;
      --text:    #1e293b;
      --muted:   #64748b;
      --success: #16a34a;
      --radius:  8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .logo-text { font-weight: 700; font-size: 1.05rem; }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      letter-spacing: .4px;
      text-transform: uppercase;
      background: #fef9c3;
      color: #a16207;
    }

    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 1rem 80px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 40px;
      width: 100%;
      max-width: 520px;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .card-title span { color: var(--accent); }

    .card-sub {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: .84rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .required-star { color: var(--accent); margin-left: 2px; }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: .9rem;
      font-family: inherit;
      transition: border-color .15s;
    }
    input:focus {
      outline: none;
      border-color: var(--accent2);
    }

    .status-group {
      display: flex;
      gap: 10px;
    }
    .status-option {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-size: .88rem;
    }
    .status-option:has(input:checked) {
      border-color: var(--accent2);
      background: rgba(2,132,199,.06);
    }
    .status-option input { accent-color: var(--accent2); cursor: pointer; }

    .alert {
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 18px;
      font-size: .87rem;
      display: none;
    }
    .alert.visible { display: block; }
    .alert-error {
      background: rgba(255,75,75,.08);
      border: 1px solid rgba(255,75,75,.3);
      color: #b91c1c;
    }
    .alert-success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #15803d;
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: var(--radius);
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-submit:hover:not(:disabled) { opacity: .85; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: .82rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 500px) {
      .card { padding: 28px 20px; }
      .status-group { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">📡</div>
  <span class="logo-text"><a href="/cribl/" style="color:inherit;text-decoration:none">Cribl Framework</a></span>
  <span class="badge">Admin</span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
    <a href="{{ url_for('portal_index') }}" style="color:var(--muted);text-decoration:none;font-size:.84rem;padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border);transition:all .15s;">Portal</a>
    <a href="{{ url_for('cribl_app_page') }}" style="color:var(--muted);text-decoration:none;font-size:.84rem;padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border);transition:all .15s;">Pusher</a>
    <a href="{{ url_for('entitlements_page') }}" style="color:var(--muted);text-decoration:none;font-size:.84rem;padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border);transition:all .15s;">Entitlements</a>
    {% if current_user %}
    <span style="color:var(--muted);font-size:.84rem;margin-left:8px;">{{ current_display_name }}</span>
    <a href="{{ url_for('logout') }}" style="color:var(--accent);text-decoration:none;font-size:.84rem;padding:5px 12px;border-radius:var(--radius);border:1px solid var(--accent);transition:all .15s;">Logout</a>
    {% endif %}
  </div>
</header>

<main>
  <div class="card">
    <p class="card-title">Update <span>Request Status</span></p>
    <p class="card-sub">Enter the Request ID from ELK and set the new status.</p>

    <div id="alert-error" class="alert alert-error" role="alert"></div>
    <div id="alert-success" class="alert alert-success" role="status"></div>

    <div class="form-group">
      <label for="request-id">Request ID <span class="required-star">*</span></label>
      <input type="text" id="request-id" placeholder="e.g. REQ-20260320-A1B2C3D4" autocomplete="off" />
    </div>

    <div class="form-group">
      <label>New Status <span class="required-star">*</span></label>
      <div class="status-group">
        <label class="status-option">
          <input type="radio" name="status" value="pending" />
          <span>Pending</span>
        </label>
        <label class="status-option">
          <input type="radio" name="status" value="done" checked />
          <span>Done</span>
        </label>
        <label class="status-option">
          <input type="radio" name="status" value="rejected" />
          <span>Rejected</span>
        </label>
      </div>
    </div>

    <button class="btn-submit" id="submit-btn" onclick="updateStatus()">
      Update Status
    </button>
  </div>
</main>

<footer>
  Cribl Framework — Admin
</footer>

<script>
  function updateStatus() {
    const requestId   = document.getElementById('request-id').value.trim();
    const status      = document.querySelector('input[name="status"]:checked')?.value || '';

    const errEl  = document.getElementById('alert-error');
    const okEl   = document.getElementById('alert-success');
    errEl.classList.remove('visible');
    okEl.classList.remove('visible');

    const errors = [];
    if (!requestId)   errors.push('Request ID is required.');
    if (!status)      errors.push('Select a status.');

    if (errors.length) {
      errEl.textContent = errors.join(' ');
      errEl.classList.add('visible');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Updating…';

    fetch('/cribl/portal/admin/update-status', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ request_id: requestId, status }),
    })
    .then(res => res.json().then(data => ({ status: res.status, data })))
    .then(({ status: httpStatus, data }) => {
      if (data.errors) {
        errEl.textContent = data.errors.join(' ');
        errEl.classList.add('visible');
      } else {
        okEl.textContent = `Request ${data.request_id} updated to "${data.status}" successfully.`;
        okEl.classList.add('visible');
        document.getElementById('request-id').value = '';
      }
    })
    .catch(err => {
      errEl.textContent = `Request failed: ${err.message}`;
      errEl.classList.add('visible');
    })
    .finally(() => {
      btn.disabled = false;
      btn.innerHTML = 'Update Status';
    });
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') updateStatus();
  });
</script>
</body>
</html>
